<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Te Amo</title>

<style>
html,body{
  margin:0;
  padding:0;
  background:#0a0010;
  overflow:hidden;
  font-family:Georgia, serif;
}

canvas{
  position:fixed;
  top:0;
  left:0;
}

#hint{
  position:fixed;
  bottom:25px;
  width:100%;
  text-align:center;
  color:rgba(255,150,190,.6);
  font-style:italic;
  letter-spacing:2px;
}

#carta{
  display:none;
  position:fixed;
  inset:0;
  background:#0a0010;
  overflow:auto;
  padding:30px 20px;
}

#carta-box{
  max-width:500px;
  margin:0 auto;
  background:rgba(20,4,18,.98);
  border-radius:20px;
  padding:30px;
  color:#ffddee;
  box-shadow:0 0 40px rgba(255,20,70,.2);
}

#voltar{
  position:fixed;
  top:15px;
  left:15px;
  display:none;
  padding:8px 18px;
  border:none;
  border-radius:20px;
  background:rgba(255,80,120,.2);
  color:#fff;
}
</style>
</head>
<body>

<canvas id="c"></canvas>
<div id="hint">toque no coração</div>

<div id="carta">
  <div id="carta-box">
    <h1 style="color:#ff6699;text-align:center;">Meu bem,</h1>
    <p>
      Você é a pessoa mais importante da minha vida.
      Cada momento ao seu lado vira algo especial.
    </p>
    <p>
      Eu te amo de verdade. E quero você comigo
      hoje, amanhã e sempre.
    </p>
    <p style="text-align:right;margin-top:30px;font-size:22px;color:#ff7799;">
      Leon ♡
    </p>
  </div>
</div>

<button id="voltar">voltar</button>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let rot = 0;
let auto = true;

canvas.addEventListener("click", abrirCarta);

function abrirCarta(){
  document.getElementById("carta").style.display="block";
  document.getElementById("voltar").style.display="block";
  document.getElementById("hint").style.display="none";
  auto=false;
}

document.getElementById("voltar").onclick = function(){
  document.getElementById("carta").style.display="none";
  document.getElementById("voltar").style.display="none";
  document.getElementById("hint").style.display="block";
  auto=true;
};

function draw(){
  requestAnimationFrame(draw);

  ctx.fillStyle="#0a0010";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  if(auto) rot += 0.01;

  const cx = canvas.width/2;
  const cy = canvas.height/2;

  const cosY = Math.cos(rot);

  for(let i=0;i<200;i++){
    const t = i/200*Math.PI*2;
    const x = 16*Math.pow(Math.sin(t),3);
    const y = -(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));

    const sx = cx + x*cosY*15;
    const sy = cy + y*15;

    ctx.font="italic 14px Georgia";
    ctx.textAlign="center";
    ctx.textBaseline="middle";
    ctx.shadowColor="#ff4477";
    ctx.shadowBlur=8;
    ctx.fillStyle="#ff4477";
    ctx.fillText("te amo", sx, sy);
  }
}
draw();
</script>

</body>
</html>
